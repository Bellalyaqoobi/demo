<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Snapp</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/animations.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card animate-slide-up">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <i class="fas fa-taxi"></i>
                    <span>Snapp</span>
                </a>
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-subtitle">Join Snapp for convenient rides</p>
            </div>

            <form id="registerForm" class="auth-form">
                <!-- Full Name -->
                <div class="form-group">
                    <label for="fullName" class="form-label">
                        <i class="fas fa-user"></i>
                        Full Name
                    </label>
                    <input type="text" 
                           class="form-control" 
                           id="fullName" 
                           name="fullName" 
                           placeholder="Enter your full name"
                           required>
                    <div class="error-message" id="nameError"></div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <input type="email" 
                           class="form-control" 
                           id="email" 
                           name="email" 
                           placeholder="Enter your email"
                           required>
                    <div class="error-message" id="emailError"></div>
                </div>

                <!-- Phone Number -->
                <div class="form-group">
                    <label for="phone" class="form-label">
                        <i class="fas fa-phone"></i>
                        Phone Number
                    </label>
                    <input type="tel" 
                           class="form-control" 
                           id="phone" 
                           name="phone" 
                           placeholder="Enter your phone number"
                           required>
                    <div class="error-message" id="phoneError"></div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="password-field">
                        <input type="password" 
                               class="form-control" 
                               id="password" 
                               name="password" 
                               placeholder="Create a password"
                               required>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                    </div>
                    <div class="strength-text" id="strengthText">Enter password</div>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">
                        <i class="fas fa-lock"></i>
                        Confirm Password
                    </label>
                    <div class="password-field">
                        <input type="password" 
                               class="form-control" 
                               id="confirmPassword" 
                               name="confirmPassword" 
                               placeholder="Confirm your password"
                               required>
                        <button type="button" class="password-toggle" id="toggleConfirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message" id="confirmPasswordError"></div>
                </div>

                <!-- User Type -->
                <div class="form-group">
                    <label class="form-label">I want to join as</label>
                    <div class="user-type-selector">
                        <label class="radio-container">
                            <input type="radio" name="userType" value="user" checked>
                            <span class="radio-custom"></span>
                            <span>Rider</span>
                        </label>
                        <label class="radio-container">
                            <input type="radio" name="userType" value="driver">
                            <span class="radio-custom"></span>
                            <span>Driver</span>
                        </label>
                    </div>
                </div>

                <!-- Driver Fields (Hidden by default) -->
                <div id="driverFields" style="display: none;">
                    <div class="form-group">
                        <label for="licenseNumber" class="form-label">
                            <i class="fas fa-id-card"></i>
                            Driver License Number
                        </label>
                        <input type="text" 
                               class="form-control" 
                               id="licenseNumber" 
                               name="licenseNumber" 
                               placeholder="Enter your license number">
                        <div class="error-message" id="licenseError"></div>
                    </div>

                    <div class="form-group">
                        <label for="vehicleModel" class="form-label">
                            <i class="fas fa-car"></i>
                            Vehicle Model
                        </label>
                        <input type="text" 
                               class="form-control" 
                               id="vehicleModel" 
                               name="vehicleModel" 
                               placeholder="Enter your vehicle model">
                        <div class="error-message" id="vehicleError"></div>
                    </div>

                    <div class="form-group">
                        <label for="licensePlate" class="form-label">
                            <i class="fas fa-hashtag"></i>
                            License Plate
                        </label>
                        <input type="text" 
                               class="form-control" 
                               id="licensePlate" 
                               name="licensePlate" 
                               placeholder="Enter license plate">
                        <div class="error-message" id="plateError"></div>
                    </div>
                </div>

                <!-- Terms and Conditions -->
                <div class="form-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="terms" required>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">
                            I agree to the <a href="#" class="terms-link">Terms of Service</a> and 
                            <a href="#" class="terms-link">Privacy Policy</a>
                        </span>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i>
                    </span>
                </button>

                <!-- Login Link -->
                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Sign in</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-icon success">
                <i class="fas fa-check-circle"></i>
            </div>
            <h3>Registration Successful!</h3>
            <p>Your account has been created successfully.</p>
            <button class="btn btn-primary" onclick="redirectToLogin()">Go to Login</button>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="auth.js"></script>
</body>
</html>
